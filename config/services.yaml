services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false
        bind:
            $projectDir: '%kernel.project_dir%'

    Kachnitel\AdminBundle\Controller\:
        resource: '../src/Controller'
        tags: ['controller.service_arguments']

    Kachnitel\AdminBundle\Command\:
        resource: '../src/Command'
        tags: ['console.command']

    Kachnitel\AdminBundle\Service\:
        resource: '../src/Service'

    Kachnitel\AdminBundle\Service\Preferences\:
        resource: '../src/Service/Preferences'

    Kachnitel\AdminBundle\Service\Preferences\AdminPreferencesStorageInterface:
        alias: Kachnitel\AdminBundle\Service\Preferences\SessionAdminPreferencesStorage

    Kachnitel\AdminBundle\DataSource\:
        resource: '../src/DataSource'
        exclude: '../src/DataSource/DoctrineDataSource.php'

    # ArchiveService needs explicit args from container parameters; public: true
    # prevents InlineServiceDefinitions from duplicating its subtree.
    Kachnitel\AdminBundle\Archive\ArchiveService:
        # public: true
        arguments:
            $globalExpression: '%kachnitel_admin.archive.expression%'
            $globalRole: '%kachnitel_admin.archive.role%'

    # public: true for the same reason — prevents inlining through EntityList.
    Kachnitel\AdminBundle\Service\EntityListArchiveService:
        # public: true

    Kachnitel\AdminBundle\Twig\Extension\:
        resource: '../src/Twig/Extension'
        exclude: '../src/Twig/Extension/AdminConfigExtension.php'
        tags: ['twig.extension']

    Kachnitel\AdminBundle\Twig\Extension\AdminConfigExtension:
        arguments:
            $baseLayout: '%kachnitel_admin.base_layout%'
            $theme: '%kachnitel_admin.theme%'
        tags: ['twig.extension']

    Kachnitel\AdminBundle\Twig\Runtime\:
        resource: '../src/Twig/Runtime'
        tags: ['twig.runtime']

    Kachnitel\AdminBundle\Twig\Runtime\AdminEntityUrlRuntime:
        arguments:
            $entityDiscovery: '@Kachnitel\AdminBundle\Service\EntityDiscoveryService'
        tags: ['twig.runtime']

    Kachnitel\AdminBundle\Twig\Runtime\AdminRouteRuntime:
        arguments:
            $entityDiscovery: '@Kachnitel\AdminBundle\Service\EntityDiscoveryService'
            $formRegistry: '@form.registry'
            $formNamespace: '%kachnitel_admin.form_namespace%'
            $formSuffix: '%kachnitel_admin.form_suffix%'
            $entityNamespace: '%kachnitel_admin.entity_namespace%'
        tags: ['twig.runtime']

    # public: true for the same reason as ArchiveService above.
    Kachnitel\AdminBundle\Twig\Runtime\AdminArchiveRuntime:
        # public: true
        arguments:
            $archiveService: '@?Kachnitel\AdminBundle\Archive\ArchiveService'
        tags: ['twig.runtime']

    Kachnitel\AdminBundle\Twig\Components\:
        resource: '../src/Twig/Components'
        tags: ['twig.component']

    Kachnitel\AdminBundle\Config\EntityListConfig:
        arguments:
            $formNamespace: '%kachnitel_admin.form_namespace%'
            $formSuffix: '%kachnitel_admin.form_suffix%'
            $defaultItemsPerPage: '%kachnitel_admin.pagination.default_items_per_page%'
            $allowedItemsPerPage: '%kachnitel_admin.pagination.allowed_items_per_page%'

    # public: true prevents InlineServiceDefinitions from expanding EntityList's
    # entire dependency graph wherever the component is referenced.
    Kachnitel\AdminBundle\Twig\Components\EntityList:
        # public: true
        arguments:
            $archiveService: '@Kachnitel\AdminBundle\Service\EntityListArchiveService'

    # Generic Admin Controller (auto-discovers entities via #[Admin] attribute)
    Kachnitel\AdminBundle\Controller\GenericAdminController:
        arguments:
            $entityDiscovery: '@Kachnitel\AdminBundle\Service\EntityDiscoveryService'
            $routePrefix: '%kachnitel_admin.route_prefix%'
            $dashboardRoute: '%kachnitel_admin.dashboard_route%'
            $entityNamespace: '%kachnitel_admin.entity_namespace%'
            $requiredRole: '%kachnitel_admin.required_role%'
            $formNamespace: '%kachnitel_admin.form_namespace%'
            $formSuffix: '%kachnitel_admin.form_suffix%'
        tags: ['controller.service_arguments']

    Kachnitel\AdminBundle\Security\AdminEntityVoter:
        arguments:
            $entityDiscovery: '@Kachnitel\AdminBundle\Service\EntityDiscoveryService'
            $defaultRequiredRole: '%kachnitel_admin.required_role%'
            $entityNamespace: '%kachnitel_admin.entity_namespace%'
            $decisionManager: '@?security.access.decision_manager'
        tags: ['security.voter']

    Kachnitel\AdminBundle\RowAction\:
        resource: '../src/RowAction'

    Kachnitel\AdminBundle\Twig\Runtime\RowActionRuntime:
        arguments:
            $debug: '%kernel.debug%'
